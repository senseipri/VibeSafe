version: "3.9"
 
services:
  db:
    image: postgres:16-alpine
    container_name: vibesafe_db
    environment:
      POSTGRES_DB: vibesafe
      POSTGRES_USER: vibesafe
      POSTGRES_PASSWORD: vibesafe_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibesafe"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  redis:
    image: redis:7-alpine
    container_name: vibesafe_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
 
volumes:
  pgdata: